/******************************************************************************
 * debug_sim.ini — Keil Simulator Initialization File
 *
 * Maps STM32F103VE peripheral memory regions so the CPU simulator treats them
 * as valid read/write memory instead of triggering "access violation" errors.
 *
 * NOTE: This only prevents access violations — it does NOT simulate peripheral
 * behavior.  Reads return the last written value (or 0).  The application layer
 * uses APP_CLOCK_SIM_ENABLED guards to skip real hardware register access, and
 * system_stm32f10x.c also skips SystemInit() clock setup in sim mode.
 *
 * Usage in Keil uVision:
 *   Project -> Options for Target -> Debug -> Initialization File
 *   Select this file (debug_sim.ini)
 ******************************************************************************/

/*
 * APB1 / APB2 / AHB peripheral space (0x40000000 - 0x40030000).
 * Covers: TIM, USART, I2C, SPI, GPIO, AFIO, EXTI, ADC, DMA, RCC, FLASH, CRC,
 *         PWR, BKP, RTC, FSMC configuration, etc.
 */
MAP 0x40000000, 0x40030000 READ WRITE

/*
 * Cortex-M3 internal system control space.
 * Covers: NVIC, SysTick, SCB, MPU, Debug components.
 * The simulator usually handles these natively, but mapping them explicitly
 * avoids any corner-case access violations.
 */
MAP 0xE000E000, 0xE000F000 READ WRITE

/*
 * FSMC external memory bank (NOR/PSRAM/SRAM).
 * Not used by simulation scripts but prevents violations if accidentally accessed.
 */
MAP 0xA0000000, 0xA0001000 READ WRITE

printf("debug_sim.ini: Peripheral memory mapped for simulation.\n");
